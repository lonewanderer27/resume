{% assign projects = site.data.data.projects %}
{% if projects %}
<section class="projects">
    <h2 class="title">Notable Projects</h2>
    {% for p in projects %}
        <div class="project">
            <span class="project-title">{{p.title}}</span><br/>
            <span>
                <a class="project-link" href="{{p.link}}">{{p.link}}</a>
            </span><br/>
            <span class="project-details">{{p.details}}</span>
        </div>
    {% endfor %}
</section>
{% endif %}
